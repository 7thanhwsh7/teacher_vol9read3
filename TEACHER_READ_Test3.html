<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G.EDU — Teacher Reading Correction Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --cream:        #fdfcfb;
  --cream-deep:   #f5f2ed;
  --cream-border: #e8e2d9;
  --ink:          #1a1714;
  --ink-soft:     #4a4540;
  --ink-muted:    #8a8178;
  --gold:         #D4AF37;
  --gold-light:   #F0D060;
  --gold-pale:    #fdf6dc;
  --gold-border:  #e8c84a;
  --navy:         #1b2a4a;
  --navy-mid:     #253a63;
  --highlight:    #fff176;
  --highlight-bg: #fffde7;
  --success:      #2e7d32;
  --success-bg:   #f1f8e9;
  --evidence-bg:  #e8f4fd;
  --evidence-border: #90caf9;
  --shadow-sm:    0 1px 3px rgba(26,23,20,0.08);
  --shadow-md:    0 4px 16px rgba(26,23,20,0.10);
  --shadow-lg:    0 8px 32px rgba(26,23,20,0.13);
  --radius-sm:    6px;
  --radius-md:    12px;
  --radius-lg:    18px;
  --sidebar-w:    72px;
  --font-body:    'Be Vietnam Pro', sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  box-shadow: 2px 0 12px rgba(0,0,0,0.18);
  z-index: 10;
  flex-shrink: 0;
}

.sidebar-logo {
  padding: 22px 20px 16px;
  border-bottom: 1px solid rgba(212,175,55,0.25);
  flex-shrink: 0;
}

.logo-mark {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.04em;
}

.logo-sub {
  font-size: 9px;
  font-weight: 600;
  color: rgba(212,175,55,0.6);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 2px;
}

.logo-test-name {
  margin-top: 10px;
  padding: 6px 10px;
  background: rgba(212,175,55,0.12);
  border: 1px solid rgba(212,175,55,0.35);
  border-radius: 6px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  font-style: italic;
  color: var(--gold-light);
  letter-spacing: 0.02em;
  text-align: center;
}

.sidebar-section {
  padding: 14px 16px 10px;
  flex-shrink: 0;
}

.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 8px;
}

/* Passage selector */
.passage-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 16px 0;
  flex-shrink: 0;
}

.passage-tab {
  flex: 1;
  padding: 7px 0;
  border: 1px solid rgba(212,175,55,0.3);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.passage-tab:hover {
  background: rgba(212,175,55,0.12);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.5);
}

.passage-tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy);
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(212,175,55,0.35);
}

/* Question map */
.q-map-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 10px 16px 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(212,175,55,0.2) transparent;
}

.q-map-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}

.q-chip {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  border-radius: 5px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}

.q-chip:hover {
  background: rgba(212,175,55,0.15);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.3);
}

.q-chip.answered {
  background: rgba(212,175,55,0.18);
  color: var(--gold-light);
  border-color: rgba(212,175,55,0.35);
}

.q-chip.checked {
  background: rgba(46,125,50,0.25);
  color: #a5d6a7;
  border-color: rgba(46,125,50,0.4);
}

/* Sidebar actions */
.sidebar-actions {
  padding: 12px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex-shrink: 0;
  border-top: 1px solid rgba(212,175,55,0.15);
}

.btn-sidebar {
  width: 100%;
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  border: 1px solid;
}

.btn-show-keys {
  background: var(--gold);
  color: var(--navy);
  border-color: var(--gold);
}

.btn-show-keys:hover {
  background: var(--gold-light);
  box-shadow: 0 3px 12px rgba(212,175,55,0.4);
}

.btn-clear-hl {
  background: transparent;
  color: rgba(255,255,255,0.55);
  border-color: rgba(255,255,255,0.2);
}

.btn-clear-hl:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  border-color: rgba(255,255,255,0.35);
}

/* ── MAIN CONTENT ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  min-width: 0;
}

/* Top bar */
#topbar {
  height: 52px;
  min-height: 52px;
  background: var(--cream);
  border-bottom: 1px solid var(--cream-border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  font-style: italic;
}

.topbar-meta {
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 500;
}

.topbar-passage-badge {
  margin-left: auto;
  background: var(--gold-pale);
  border: 1px solid var(--gold-border);
  color: #8a6b00;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

/* Split pane */
#split-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* Left: Passage */
#passage-pane {
  width: 50%;
  min-width: 280px;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--cream);
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--cream-border) transparent;
}

/* Splitter */
#splitter {
  width: 5px;
  background: var(--cream-border);
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  transition: background 0.2s;
  user-select: none;
}

#splitter:hover, #splitter.dragging {
  background: var(--gold);
}

#splitter::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 40px;
  background: rgba(212,175,55,0.5);
  border-radius: 4px;
}

/* Right: Questions */
#questions-pane {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--cream-deep);
  min-width: 280px;
  scrollbar-width: thin;
  scrollbar-color: var(--cream-border) transparent;
}

/* ═══════════════════════════════════════════
   PASSAGE STYLES
═══════════════════════════════════════════ */
.passage-header {
  margin-bottom: 20px;
}

.passage-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.passage-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.3;
  margin-bottom: 4px;
}

.passage-source {
  font-size: 11px;
  color: var(--ink-muted);
  font-style: italic;
}

.passage-divider {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 14px 0;
  border-radius: 2px;
}

.passage-body {
  font-size: 14px;
  line-height: 1.85;
  color: var(--ink);
  user-select: text;
}

.passage-body p {
  margin-bottom: 14px;
}

.passage-body .para-label {
  font-weight: 700;
  color: var(--navy);
  font-size: 12px;
}

mark.hl-yellow {
  background: var(--highlight);
  border-radius: 2px;
  padding: 0 1px;
  cursor: pointer;
  transition: background 0.15s;
}

mark.hl-yellow:hover {
  background: #ffee33;
  text-decoration: line-through;
  text-decoration-color: rgba(0,0,0,0.3);
}

/* Highlight toolbar */
#hl-toolbar {
  position: fixed;
  display: none;
  background: var(--navy);
  border-radius: 20px;
  padding: 5px 8px;
  gap: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.28);
  z-index: 2000;
  align-items: center;
  pointer-events: auto;
  transform: translateX(-50%);
}

#hl-toolbar.visible {
  display: flex;
}

/* small arrow under toolbar */
#hl-toolbar::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--navy);
}

.hl-btn {
  padding: 5px 14px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 14px;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
  white-space: nowrap;
}

.hl-btn:hover { background: var(--gold-light); }

/* ═══════════════════════════════════════════
   QUESTION GROUP STYLES
═══════════════════════════════════════════ */
.q-group {
  margin-bottom: 28px;
}

.q-group-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--cream-border);
}

.q-group-num {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
}

.q-group-instruction {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.5;
  background: rgba(212,175,55,0.07);
  border-left: 3px solid var(--gold);
  padding: 8px 12px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 14px;
}

/* Individual question card */
.q-card {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}

.q-card:hover {
  box-shadow: var(--shadow-md);
}

.q-card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.q-num-badge {
  min-width: 26px;
  height: 26px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}

.q-content {
  flex: 1;
}

.q-stem {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.5;
  margin-bottom: 8px;
}

/* MCQ options */
.q-options {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}

.q-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--cream-deep);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
}

.q-option:hover {
  background: var(--gold-pale);
  border-color: var(--gold-border);
}

.q-option.selected {
  background: var(--gold-pale);
  border-color: var(--gold);
}

.opt-letter {
  width: 20px;
  height: 20px;
  background: white;
  border: 1px solid var(--cream-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-muted);
  flex-shrink: 0;
}

.q-option.selected .opt-letter {
  background: var(--gold);
  border-color: var(--gold);
  color: white;
}

/* Teacher answer input */
.teacher-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.teacher-input {
  flex: 1;
  padding: 7px 12px;
  background: white;
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border 0.15s;
}

.teacher-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
}

.teacher-input.correct, .teacher-select.correct {
  border: 2px solid var(--success);
  background: var(--success-bg);
}

.teacher-input.incorrect, .teacher-select.incorrect {
  border: 2px solid #c62828;
  background: #fdecea;
}

.btn-check {
  padding: 7px 16px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-check:hover {
  background: var(--navy-mid);
  box-shadow: 0 3px 10px rgba(27,42,74,0.3);
}

/* Teacher answer dropdown (T/F/NG, YES/NO/NG, matching letters) */
.teacher-select {
  flex: 1;
  padding: 7px 30px 7px 12px;
  background: white;
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  cursor: pointer;
  transition: border 0.15s;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%238a8178' d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 16px;
}

.teacher-select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
}

/* ═══════════════════════════════════════════
   CLOZE COMPLETION LAYOUT (tables / summaries)
═══════════════════════════════════════════ */
.cloze-card {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  font-size: 13px;
  line-height: 1.9;
  color: var(--ink);
}

.cloze-card-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 14px;
  color: var(--navy);
}

.cloze-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.cloze-table th {
  background: var(--navy);
  color: var(--gold);
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.cloze-table td {
  border: 1px solid var(--cream-border);
  padding: 10px 12px;
  vertical-align: top;
}

.cloze-table tr:nth-child(even) td { background: var(--cream-deep); }

.cloze-feature-cell {
  font-weight: 700;
  color: var(--navy);
  width: 26%;
}

.cloze-blank {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin: 1px 2px;
  vertical-align: middle;
}

.cloze-num {
  font-weight: 700;
  color: #b8942a;
  font-size: 11px;
}

.cloze-input {
  width: 140px;
  padding: 4px 8px;
  border: none;
  border-bottom: 2px solid var(--gold-border);
  background: var(--gold-pale);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  text-align: center;
  border-radius: 4px 4px 0 0;
}

.cloze-input:focus {
  border-color: var(--gold);
  background: white;
  box-shadow: 0 2px 6px rgba(212,175,55,0.2);
}

.cloze-input.correct {
  border: 2px solid var(--success);
  background: var(--success-bg);
  border-radius: 4px;
}

.cloze-input.incorrect {
  border: 2px solid #c62828;
  background: #fdecea;
  border-radius: 4px;
}

.cloze-summary-text {
  font-size: 13.5px;
}

.cloze-check-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 12px 4px;
}

.cloze-check-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-right: 4px;
}

.check-chip {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid var(--cream-border);
  background: white;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}

.check-chip:hover { background: var(--gold-pale); border-color: var(--gold-border); }
.check-chip.checked { background: var(--navy); color: var(--gold); border-color: var(--navy); }
.check-chip.chip-correct { background: var(--success); color: white; border-color: var(--success); }
.check-chip.chip-incorrect { background: #c62828; color: white; border-color: #c62828; }

/* Single shared correction dock — content is replaced per click, never stacked,
   so the original passage/table layout directly above stays fully visible */
.cloze-dock {
  border: 1px solid var(--cream-border);
  border-radius: var(--radius-md);
  background: var(--cream);
  padding: 12px 14px;
  min-height: 40px;
}

.cloze-dock-placeholder {
  font-size: 11px;
  color: var(--ink-muted);
  text-align: center;
  padding: 8px 4px;
}

.cloze-dock-header {
  font-size: 11px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
}

.cloze-dock .correct-row { margin-bottom: 0; }
.cloze-dock .correct-row + .correct-row { margin-top: 8px; }

/* Correction panel */
.correction-panel {
  display: none;
  margin-top: 10px;
  border-top: 1px dashed var(--cream-border);
  padding-top: 10px;
  flex-direction: column;
  gap: 8px;
}

.correction-panel.open { display: flex; }

.correct-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
}

.correct-row.key-row {
  background: var(--success-bg);
  border: 1px solid #c8e6c9;
}

.correct-row.explain-row {
  background: #fff8e1;
  border: 1px solid #ffe082;
}

.correct-row.evidence-row {
  background: var(--evidence-bg);
  border: 1px solid var(--evidence-border);
  padding: 0;
  overflow: hidden;
}

.evidence-row-inner {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.evidence-top {
  display: flex;

<script>
/* ═══════════════════════════════════════════════════════════════
   TEACHER_DATA — JSON TEMPLATE
   Điền dữ liệu vào đây để tạo bài test. Không sửa code bên dưới.
   ───────────────────────────────────────────────────────────────
   SCHEMA:
   {
     meta: {
       title: string,        // Tên bộ đề, hiển thị ở topbar
       testName: string,     // Tên test cụ thể, hiển thị ở sidebar (vd: "Reading Test 3")

     },
     passages: [
       {
         id: number,         // 0, 1, 2 (tương ứng P1, P2, P3)

         qRange: [start, end], // Phạm vi câu hỏi (vd: [1, 13])
         paragraphs: [
           {
             label: string,  // Nhãn đoạn: "A", "B", "C"...
             text: string    // Nội dung đoạn văn
           }
         ]
       }
     ],
     questions: [
       {
         passageId: number,  // 0, 1, hoặc 2
         groupId: string,    // ID nhóm, vd: "P1G1"
         type: string,       // Loại câu: "TRUE/FALSE/NOT GIVEN" | "Multiple Choice" |
                             //   "Short Answer Questions" | "Matching Headings" |
                             //   "Matching Information" | "Summary Completion"
         instruction: string, // Hướng dẫn làm bài (tiếng Anh, như đề IELTS)
         items: [
           {
             id: number,     // Số thứ tự câu (1–40, liên tục)
             stem: string,   // Nội dung câu hỏi / câu phát biểu
             options: [      // CHỈ dùng cho Multiple Choice
               "A. ...",     // Format: "A. nội dung"
               "B. ...",
               "C. ...",
               "D. ..."
             ],
             key: string,    // Đáp án đúng. MCQ: "A"/"B"/"C"/"D". T/F/NG: "TRUE"/"FALSE"/"NOT GIVEN"
                             // Short Answer: từ/cụm từ trích từ bài. Nhiều đáp án: "ans1 / ans2"
             explanation: string, // Giải thích bằng tiếng Việt
             evidence: string     // Câu/cụm từ trích nguyên văn từ bài làm evidence
           }
         ]
       }
     ]
   }
═══════════════════════════════════════════════════════════════ */
const TEACHER_DATA = {
  meta: {
    title: "IELTS Academic Reading",
    testName: "Reading Test 3",
    totalQuestions: 40
  },

  passages: [
    /* ── PASSAGE 1 ── */
    {
      id: 0,
      title: "New Understanding of Giraffes in the Wild",
      source: "",
      qRange: [1, 13],
      paragraphs: [
        { label: "", text: "Even as the tallest animals on Earth, giraffes can be easy to overlook. Despite being a favorite in zoos, until recently almost nobody studied giraffes in the wild. 'When I first became interested in giraffes in 2008 and started looking through the scientific literature, I was really surprised to see how little had been done,' said Megan Strauss, an animal researcher at the University of Minnesota, USA. All that is changing fast, as a growing number of researchers seek to understand the biology and complex behavior of this graceful giant in its native habitat." },
        { label: "", text: "Giraffes, found throughout sub-Saharan Africa, are currently classified as a single species with up to nine varieties that differ by features like head shape and whether the fur on their legs is plain or patterned. The giraffe is not listed as endangered, but researchers point to evidence that in the past 15 years, the population has fallen some 40 percent." },
        { label: "", text: "Recent studies have allowed researchers new insights into giraffes' social structures. Groups of female giraffes, for example, have been found to form close friendships that can last for years. 'We're just at the beginnings of trying to understand this kind of behavior,' Dr Strauss said. Female giraffes can live 20 years or more, and it makes sense they might rely on each other for clues to the best feeding grounds, help with taking care of their young, or the reduction of stress, by staying in groups." },
        { label: "", text: "Mother giraffes have displayed signs of grief after losing their young, known as calves, to lions. Dr Strauss described one case in which a mother spent four days at the place where a lion had eaten her calf, refusing food, and often in the company of two other adult females. Giraffe calves are extremely vulnerable to predators, and though mothers will fight valiantly to keep their young alive — kicking forward and backward — half of all calves are killed in their first year of life." },
        { label: "", text: "Male giraffes, known as bulls, generally become more important with age, and older bulls display that dominance physically and behaviorally: as their neck muscles grow, the male's posture becomes prouder and more vertical. Recent observations show young bulls, when left on their own, mimicking their elders: head held high and neck puffed out. But should a dominant older bull come into view, the younger males instantly try to make themselves look small and innocent." },
        { label: "", text: "The younger bulls have reason to fear their elders. Clashes have been witnessed between adults when each bull repeatedly 'necks' the other, using his massive neck to slam his head against his rival. One bull somehow survived with a broken neck." },
        { label: "", text: "<strong>Physical features of giraffes: study findings</strong>" },
        { label: "", text: "The skin of a giraffe is mostly gray. The coat has dark patches separated by light hair, which serves as camouflage, allowing them to blend in with the light and shade patterns of the acacia trees from which they feed. Grazing giraffes are hard to see even a few meters away." },
        { label: "", text: "Research indicates that giraffes also have excellent sight, can see in color and over great distances, which helps them to spot lions and keep track of each other. In addition, a giraffe's extraordinary mouth has lips and tongue that can together grasp a branch and then pluck away the leaves while avoiding thorns, almost as humans would grab with their hands. Each day, a giraffe consumes about 30 kilograms of leaves, shoots and vines, all digested in its four-chambered stomach." },
        { label: "", text: "A giraffe can stand more than six meters tall, with its neck accounting for roughly a third of its height and its legs the same. The giraffe's long neck is due to the length of the vertebrae, not the number of vertebrae. The growth of the neck largely takes place during early childhood, as giraffe mothers would have a difficult time giving birth to young with longer necks. The giraffe's head and neck are held up by large muscles attached to the lower spine." },
        { label: "", text: "Recent studies show that the greatest challenge to the giraffe's cardiovascular system is how to both pump blood very high and retrieve it from far below. The outside of a giraffe's veins are extremely thick, to prevent blood leaking into surrounding tissue. Other adaptations in the cardiovascular system allow the giraffe to bend over for a drink of water, and then raise its head again quickly without fainting." },
        { label: "", text: "Researchers were also surprised to find that a giraffe does not have an unusually large heart. It is half a percent of body mass, the same as in a mouse. Moreover, the amount of blood pumped into circulation is modest, proportionally lower than it is in humans. That could help explain why giraffes rarely run for very long: enough oxygen cannot be delivered to their muscles fast enough for them to keep running. Or maybe the giraffes are worried about tripping over their own feet. This is because signals from the nerves travel at about the same speed in giraffes as in rats or other mammals. Given the greater distance they have to travel in the giraffe to reach the brain, it is possible the giraffe faces real challenges in reacting quickly to a rock beneath its hoof or a bite to its ankle." },
        { label: "", text: "New understanding of this wonderful animal sheds light on both its physiology and its behavior. Researchers hope to use this knowledge to increase their ability to work with preservation, as its habitat is reduced and the giraffe becomes scarcer." }
      ]

    {
      id: 1,
      title: "Healthy buildings, productive people",
      source: "",
      qRange: [14, 26],
      paragraphs: [
        { label: "A", text: "<em>Indoor building can influence our thinking, behavior and health</em><br><br>Have you felt tired at your desk lately? According to new research, some often overlooked environmental factors within buildings – the degree or type of ventilation, airborne contaminants, lighting and noise levels, for example – can play a surprisingly large role in how good or bad you feel, and even how well you think. It is estimated that we spend more than 90 percent of our time inside, but builders in general have paid little attention to the health aspects of indoor spaces, instead focusing on superficial design features and on meeting minimum environmental standards to keep costs down." },
        { label: "B", text: "Researchers at Harvard University in the US looked at the effects of indoor air quality on workers' cognitive performance – important both for health and for companies' bottom lines, says Joseph Allen, assistant professor of environmental health and principal investigator of the studies. 'The true cost of running our buildings should take into account the health and productivity of people in those buildings,' Allen says. In fact, an analysis by the team showed that the cost of making alterations that could boost cognitive performance significantly was minuscule compared with the related increase in productivity – about $40 per person, per year, compared with a $6,500 increase in employee productivity." },
        { label: "C", text: "The team's first study, published in Environmental Health Perspectives, was conducted at the Syracuse Center of Excellence, a US research organization devoted to studying and developing sustainability. The center houses a laboratory that allows researchers to test a wide range of indoor air quality factors using sophisticated ventilation. Each day, the indoor environment was controlled with a ventilation system which included small amounts of carbon dioxide and volatile organic compounds, or VOCs – the toxic by-products of office supplies commonly found in the workplace. The office workers were blinded to the conditions. For six days over two weeks, 24 office workers with administrative, technical, professional or managerial jobs came to the lab and performed their regular work under minimal supervision, as well as participating in an hour and a half of cognitive testing at the end of the day. The cognitive tasks used in the study had participants respond to online scenarios that mimic real-life situations, such as running a city as a mayor. The findings are remarkable for showing in a well-controlled study, that indoor air quality can significantly lower cognitive performance in buildings that would otherwise meet current building standards, notes environmental psychologist Craig Zimring, director of Georgia Tech University's SimTigrate Design Lab in the US. 'If these findings are replicated in other labs and in real-world work environments,' he says, 'they could lead to designs that provide much more outside air through mechanical ventilation or operable windows, for example' – in turn, promoting better health and performance." },
        { label: "D", text: "In a second study, reported in Building and Environment, the Harvard-Syracuse team moved from the lab to the real world. Using the same methodology, they compared test scores of 109 people working in 10 buildings – about 12 people per site – in two buildings in each of five cities. When the team examined the buildings for differences, they found that certified buildings had lower humidity levels and brighter light than the non-certified buildings. That said, the differences in humidity and lighting didn't entirely explain the differing cognitive function scores of people on the job. This has led researchers to believe that other factors, such as how someone feels about their working environment, may also play a part, notes Harvard research fellow Piers MacNaughton, who led the study." },
        { label: "E", text: "A recently constructed building on the Washington University campus in St. Louis, US, is providing another opportunity to examine how green building design can affect health and behavior. Hillman Hall was designed with the highest environmental and energy standards available, as well as design elements intended to foster more collaboration and physical activity, says Amy Eyler, associate professor and assistant dean for public health at the Brown School at Washington University. The design includes easy access to stairways, plenty of natural light, generous spaces for collaboration, desks that allow people to sit or stand up, and inviting places to walk. Unlike traditional hallways designed as long corridors with private offices to either side, for example, these hallways include classrooms, offices and spaces to sit, so they are multi-use – 'you have many reasons to walk them,' says Eyler. To test how the building might affect people's behavior, Eyler conducted a pre-test before people moved in, and a post-test one year later. Her team collected data on the three main features the designers were attempting to foster: physical activity, collaboration and sustainable practices. Results showed that people were more likely to take part in spontaneous collaborations in the new space than in the older ones, and to be physically active." },
        { label: "F", text: "Like other researchers in this growing field, Eyler sees multidisciplinary collaboration as the key to success. Administrators, public health faculty and architects worked together to create a building that captured the university's vision for a space that fosters collegial work and health for faculty, staff and students – a shared goal evidenced by the fact that the architecture firm that designed the building also funded part of the research. 'Complex projects like this one need teams of people with varied backgrounds and expertise in order to solve them,' Eyler says." }
      ]
    },
    /* ── PASSAGE 3 ── */
    {
      id: 2,
      title: "Child's Play in Medieval England",
      source: "Professor Nicholas Orme investigates childhood in the Middle Ages",
      qRange: [27, 40],
      paragraphs: [
        { label: "A", text: "'Play up! Play up! And play the game!' The ringing chorus of Sir Henry Newbolt's celebrated cricket poem Vitaï Lampada (1908) sums up views about play in 19th- and early 20th-century Britain. Children's play was important, and adults should regulate and direct it. Games promoted endurance, self-discipline and team spirit – qualities needed for the health of society and government. Newbolt was one in a long line of people who thought in this way. The notion that children's play should be used for educational and social purposes goes back at least to the ancient Greeks and the toys and games of medieval England tell us much about how adults then saw childhood. But they also reveal a good deal about children themselves, and cast light on what has recently become a controversial issue." },
        { label: "B", text: "Forty years ago, the French historian Philippe Ariès argued, in Centuries of Childhood, that childhood in the Middle Ages did not exist in its modern sense. Children were regarded by adults with relatively little affection and followed a way of life not very different from that of their elders. More recent historians have disputed this, pointing to plentiful signs of parental affection and arguing that childhood, by its very nature, must always have been much the same." },
        { label: "C", text: "In this debate play is crucial. Did adults encourage it? If so, did they see it as recreational (by providing toys, for example) or as educational (making children play in particular ways)? Did children play as their elders told them, or did they invent their own games, away from adults and even against their wishes? These questions can be answered from a rich body of evidence including actual toys of the period, pictures of children's activities in contemporary manuscripts and literary sources such as religious works and dictionaries. We know not only how medieval English children played but what their elders thought on the subject." },
        { label: "D", text: "We know, for example, that adults gave children toys from infancy onwards. In 1398 the writer John Trevisa describes babies playing with 'a child's brooch', an object similar in function to the bright plastic toys given to babies today to bite and handle. William Horman, 16th-century author of a Latin textbook, talks of buying a rattle to stop a baby crying. Indeed, by 1300 it appears there was a toy industry in England. Boys' toys often took military forms, such as the two metal soldiers of that date, found in London, and made from a mould. Girls had dolls, known before the 17th century as 'poppets' or puppets, commercially manufactured, imported and, in 1582, taxed at a halfpenny each. Not that children were by any means dependent on things that were bought for them. Gerald of Wales recalls how he and his brothers built towns, palaces, churches and monasteries from sand at Manorbier Castle in about 1150 (perhaps on the nearby beach)." },
        { label: "E", text: "Active games were universal. In his English-to-Latin dictionary of 1440, a mysterious recluse known as Geoffrey mentions children playing 'tennis' and swinging on what he calls a 'totter' or 'merrytotter'. Children chased each other, swam and played ball games. Boys in the later Middle Ages shot arrows with bows and archery is an example of a sport encouraged by adults, who wanted boys to grow up to play their part in what was, for most men, a warrior society." },
        { label: "F", text: "However, by no means all children's military activity was directed by adults. In 1400, six months after King Richard II had been overthrown by Henry IV, the children of London gathered together and chose themselves kings. Adam of Usk tells us they congregated 'in thousands … and made war upon each other … whereby many died'. The new king had to order their parents and masters to stop them." },
        { label: "G", text: "This willingness of children to take the initiative in play, not just to wait for adults to direct them, is evident in the way they observed the calendar. Medieval life was regulated by light, weather, crops and the Church's cycle of fasts and festivals. Children shared in the adult round of religious festivals, but had their own observances as well, semi-detached from their elders. In the 1200s, the priest Thomas Docking remarked that in spring a child 'follows the ploughman; in autumn he accompanies the grape-gatherers'. In 1518, the poet Alexander Barclay records children playing with tops in March, looking for fruit in summer and making footballs by filling pigs' bladders with dried peas in autumn." },
        { label: "H", text: "It is clear from this evidence that the relationship between adults and children in medieval society was, in major respects, a modern one. Parents took an indulgent interest in their children, providing them with toys and giving them time to play. Children played in a wide variety of ways – imaginatively, skilfully, athletically and violently – developing their minds, bodies and social skills. Adults tried at times to direct play – partly to keep children in order, partly to give them skills for adult life – but children gravitated to one another and formed a culture of their own. We can answer Ariès's thesis, then, with a resounding 'No!'. Childhood has always been much the same." }
      ]
    }

/* ═══════════════════════════════════════════════════════════════
   QUESTION MAP (sidebar)
═══════════════════════════════════════════════════════════════ */
function buildQuestionMap() {
  const grid = document.getElementById('q-map');
  grid.innerHTML = '';
  for (let i = 1; i <= TEACHER_DATA.meta.totalQuestions; i++) {
    const chip = document.createElement('div');
    chip.className = 'q-chip';
    chip.textContent = i;
    chip.id = `qchip-${i}`;
    chip.onclick = () => scrollToQuestion(i);
    grid.appendChild(chip);
  }
}

function scrollToQuestion(id) {
  const el = document.getElementById(`q-card-${id}`);
  if (el) {
    // Switch passage if needed
    const qData = findQuestionById(id);
    if (qData && qData.passageId !== currentPassage) {
      switchPassage(qData.passageId);
      setTimeout(() => {
        const el2 = document.getElementById(`q-card-${id}`);
        if (el2) el2.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    } else {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

function findQuestionById(id) {
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      if (item.id === id) return { ...item, passageId: group.passageId, groupId: group.groupId, groupLayout: group.layout };
    }
  }
  return null;
}

function updateChipState(id, state) {
  const chip = document.getElementById(`qchip-${id}`);
  if (!chip) return;
  chip.classList.remove('answered', 'checked');
  if (state) chip.classList.add(state);
}

function renderPassage(passageIdx) {
  const p = TEACHER_DATA.passages[passageIdx];
  const container = document.getElementById('passage-content');
  document.getElementById('passage-badge').textContent = `Passage ${passageIdx + 1}`;

  let html = `
    <div class="passage-header">
      <div class="passage-eyebrow">Reading Passage ${passageIdx + 1} · Questions ${p.qRange[0]}–${p.qRange[1]}</div>
      <div class="passage-title">${p.title}</div>
      <div class="passage-source">${p.source}</div>
      <div class="passage-divider"></div>
    </div>
    <div class="passage-body" id="passage-body-${passageIdx}">
  `;

  for (const para of p.paragraphs) {
    html += `<p><span class="para-label">${para.label}</span>&nbsp;&nbsp;${para.text}</p>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

  </div>`;

function renderQuestions(passageIdx) {
  const container = document.getElementById('questions-content');
  const groups = TEACHER_DATA.questions.filter(g => g.passageId === passageIdx);

  if (!groups.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">📄</div>
      <div class="empty-state-title">No questions</div>
      <div class="empty-state-sub">No questions found for this passage.</div>
    </div>`;
    return;
  }

  let html = '';
  for (const group of groups) {
    const firstId = group.items[0].id;
    const lastId = group.items[group.items.length - 1].id;

    html += `<div class="q-group">
      <div class="q-group-header">
        <span class="q-group-num">Questions ${firstId}–${lastId}</span>
        <span class="q-type-badge" onclick="openTipsPanel('${group.type}')">
          <span class="tip-icon">💡</span>${group.type}
        </span>
      </div>
      <div class="q-group-instruction">${group.instruction}</div>`;

    if (group.layout === 'cloze') {
      // ── CLOZE COMPLETION (tables / summaries reproduced from the original test) ──
      html += `<div class="cloze-card">${group.clozeContent}</div>
        <div class="cloze-check-row">
          <span class="cloze-check-label">Check đáp án câu:</span>`;
      for (const item of group.items) {
        html += `<button class="check-chip" id="check-chip-${item.id}" onclick="checkAnswer(${item.id})">${item.id}</button>`;
      }
      html += `</div>
        <div class="cloze-dock" id="cloze-dock-${group.groupId}">
          <div class="cloze-dock-placeholder">Bấm số câu ở trên để xem key, giải thích và evidence</div>
        </div>`;
    } else {
      // ── STANDARD PER-QUESTION CARDS (MCQ / dropdown / free text) ──
      for (const item of group.items) {
        const isMCQ = !!item.options;
        const isDropdown = !isMCQ && group.answerFormat === 'dropdown' && Array.isArray(group.dropdownOptions);

        html += `<div class="q-card" id="q-card-${item.id}">
          <div class="q-card-top">
            <div class="q-num-badge">${item.id}</div>
            <div class="q-content">
              <div class="q-stem">${item.stem}</div>`;

        if (isMCQ) {
          html += `<div class="q-options">`;
          for (const opt of item.options) {
            const letter = opt[0];
            html += `<div class="q-option" onclick="selectOption(${item.id}, '${letter}', this)">
              <div class="opt-letter">${letter}</div>
              <span>${opt.substring(3)}</span>
            </div>`;
          }
          html += `</div>`;
        } else if (isDropdown) {
          html += `<div class="teacher-input-wrap">
            <select class="teacher-select" id="teacher-input-${item.id}">
              <option value="">— Chọn đáp án học sinh —</option>
              ${group.dropdownOptions.map(opt => {
                const val = (typeof opt === 'string') ? opt : opt.value;
                const lbl = (typeof opt === 'string') ? opt : opt.label;
                return `<option value="${val}">${lbl}</option>`;
              }).join('')}
            </select>
          </div>`;
        } else {
          html += `<div class="teacher-input-wrap">
            <input class="teacher-input" id="teacher-input-${item.id}" 
              type="text" placeholder="Nhập đáp án học sinh…"
              onkeydown="if(event.key==='Enter') checkAnswer(${item.id})">
          </div>`;
        }

        html += `
              <div style="display:flex;gap:6px;">
                <button class="btn-check" onclick="checkAnswer(${item.id})">Check →</button>
              </div>
              ${buildCorrectionPanelHTML(item)}
            </div>
          </div>
        </div>`;
      }
    }
    html += `</div>`;
  }

  container.innerHTML = html;

  // Restore checked states
  for (const [id, state] of Object.entries(checkedQuestions)) {
    if (state) {
      const panel = document.getElementById(`correction-${id}`);
      if (panel) panel.classList.add('open');
      const clozeChip = document.getElementById(`check-chip-${id}`);
      const saved = studentAnswers[id];
      if (clozeChip) {
        clozeChip.classList.add('checked');
        if (saved) clozeChip.classList.add(saved.isCorrect ? 'chip-correct' : 'chip-incorrect');
      }
      const input = document.getElementById(`teacher-input-${id}`);
      if (input && saved) {
        input.value = saved.studentAnswer;
        input.classList.add(saved.isCorrect ? 'correct' : 'incorrect');
      }
    }
  }
}

function highlightEvidence(evidence, key) {
  if (!evidence) return '';
  const keywords = key.split(/[\s,\/]+/).filter(w => w.length > 2);
  let result = evidence;
  for (const kw of keywords) {
    const re = new RegExp(`(${kw})`, 'gi');
    result = result.replace(re, `<span class="evidence-keyword">$1</span>`);
  }
  return result;
}

/* ═══════════════════════════════════════════════════════════════
   VIEW EVIDENCE IN PASSAGE
   Finds the evidence phrase inside the passage pane, scrolls to it,
   wraps it in a temporary flash span, then removes it after 3s.
═══════════════════════════════════════════════════════════════ */
let _activeEvidenceBtn = null;
let _activeFlashSpans = [];

function viewEvidenceInPassage(btn) {
  const evidenceText = btn.dataset.evidence;
  if (!evidenceText) return;

  // Toggle off if same button clicked again
  if (_activeEvidenceBtn === btn) {
    clearEvidenceFlash();
    return;
  }

  // Clear any previous flash
  clearEvidenceFlash();

  _activeEvidenceBtn = btn;
  btn.classList.add('active');
  btn.textContent = '✕ Đang xem…';

  const passagePane = document.getElementById('passage-pane');

  // Build a clean search string (collapse whitespace)
  const searchStr = evidenceText.replace(/\s+/g, ' ').trim();

  // Use TreeWalker to find the text node(s) containing the phrase
  const result = findTextInPane(passagePane, searchStr);

  if (!result) {
    btn.textContent = '⚠ Không tìm thấy';
    btn.classList.remove('active');
    setTimeout(() => { btn.textContent = '📍 Xem trong bài'; }, 2000);
    _activeEvidenceBtn = null;
    return;
  }

  // Wrap the matched range in flash spans (may span nodes)
  const flashSpans = wrapRangeWithFlash(result);
  _activeFlashSpans = flashSpans;

  // Scroll the first span into view in the passage pane
  if (flashSpans.length > 0) {
    flashSpans[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Auto-clear after 3.5s
  setTimeout(() => {
    if (_activeEvidenceBtn === btn) clearEvidenceFlash();
  }, 3500);
}

function clearEvidenceFlash() {
  _activeFlashSpans.forEach(span => {
    const parent = span.parentNode;
    if (!parent) return;
    while (span.firstChild) parent.insertBefore(span.firstChild, span);
    parent.removeChild(span);
    try { parent.normalize(); } catch(e) {}
  });
  _activeFlashSpans = [];

  if (_activeEvidenceBtn) {
    _activeEvidenceBtn.classList.remove('active');
    _activeEvidenceBtn.textContent = '📍 Xem trong bài';
    _activeEvidenceBtn = null;
  }
}

/**
 * Find `searchStr` across text nodes inside `container`.
 * Returns a Range covering the match, or null.
 */
function findTextInPane(container, searchStr) {
  // Concatenate all text node content with bookmarks to map back positions
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  let node;
  while ((node = walker.nextNode())) nodes.push(node);

  // Build a single string from all text, track node boundaries
  let fullText = '';
  const nodeMap = []; // { node, start, end }
  for (const n of nodes) {
    const start = fullText.length;
    fullText += n.textContent;
    nodeMap.push({ node: n, start, end: fullText.length });
  }

  // Normalise whitespace in fullText for matching (but keep original nodes)
  // We search on a whitespace-collapsed shadow, mapping indices back
  const shadowText = fullText.replace(/\s+/g, ' ');
  const searchNorm = searchStr.replace(/\s+/g, ' ');

  // Build index map: shadowText[i] → fullText index
  const shadowToFull = [];
  let fi = 0;
  let prevWasSpace = false;
  for (let si = 0; si < fullText.length; si++) {
    const ch = fullText[si];
    const isSpace = /\s/.test(ch);
    if (isSpace) {
      if (!prevWasSpace) {
        shadowToFull.push(si);
        prevWasSpace = true;
      }
      // collapsed — don't push
    } else {
      shadowToFull.push(si);
      prevWasSpace = false;
    }
  }

  const matchIdx = shadowText.indexOf(searchNorm);
  if (matchIdx < 0) return null;

  const fullStart = shadowToFull[matchIdx] ?? matchIdx;
  const fullEnd   = (shadowToFull[matchIdx + searchNorm.length - 1] ?? (matchIdx + searchNorm.length - 1)) + 1;

  // Map fullText positions back to DOM nodes
  function nodeAtPos(pos) {
    for (const nm of nodeMap) {
      if (pos >= nm.start && pos < nm.end) {
        return { node: nm.node, offset: pos - nm.start };
      }
    }
    // edge case: end of last node
    const last = nodeMap[nodeMap.length - 1];
    return { node: last.node, offset: last.node.textContent.length };
  }

  const startInfo = nodeAtPos(fullStart);
  const endInfo   = nodeAtPos(fullEnd);

  const range = document.createRange();
  range.setStart(startInfo.node, startInfo.offset);
  range.setEnd(endInfo.node, endInfo.offset);
  return range;
}

/**
 * Wrap a Range (possibly multi-node) with <span class="evidence-flash"> elements.
 * Returns array of spans created.
 */
function wrapRangeWithFlash(range) {
  const passagePane = document.getElementById('passage-pane');
  const walker = document.createTreeWalker(
    range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer,
    NodeFilter.SHOW_TEXT,
    null
  );

  const nodes = [];
  let node;
  while ((node = walker.nextNode())) {
    if (!passagePane.contains(node)) continue;
    if (!range.intersectsNode(node)) continue;
    nodes.push(node);
  }

  const spans = [];
  nodes.forEach(textNode => {
    let start = 0;
    let end = textNode.length;
    if (textNode === range.startContainer) start = range.startOffset;
    if (textNode === range.endContainer)   end   = range.endOffset;
    if (start >= end) return;

    const before = textNode.splitText(start);
    before.splitText(end - start);

    const span = document.createElement('span');
    span.className = 'evidence-flash';
    before.parentNode.insertBefore(span, before);
    span.appendChild(before);
    spans.push(span);
  });

  return spans;
}

function switchPassage(idx) {
  currentPassage = idx;

  // Update tabs
  document.querySelectorAll('.passage-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  renderPassage(idx);
  renderQuestions(idx);

  // Scroll both panes to top
  document.getElementById('passage-pane').scrollTop = 0;
  document.getElementById('questions-pane').scrollTop = 0;
}

/* ═══════════════════════════════════════════════════════════════
   MCQ SELECTION
═══════════════════════════════════════════════════════════════ */
function selectOption(qId, letter, el) {
  const card = document.getElementById(`q-card-${qId}`);
  card.querySelectorAll('.q-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.selected = letter;
  updateChipState(qId, 'answered');
}

/* ═══════════════════════════════════════════════════════════════
   CHECK ANSWER
═══════════════════════════════════════════════════════════════ */
function checkAnswer(qId) {
  const qData = findQuestionById(qId);
  if (!qData) return;

  checkedQuestions[qId] = true;
  updateChipState(qId, 'checked');

  let studentAnswer = '';
  let isCorrect = false;

  if (qData.options) {
    // MCQ — find selected option
    const card = document.getElementById(`q-card-${qId}`);
    const selected = card ? card.querySelector('.q-option.selected') : null;
    studentAnswer = selected ? selected.dataset.selected : '';
    isCorrect = studentAnswer.toUpperCase() === qData.key.toUpperCase();
  } else {
    // Text input / dropdown / cloze input — all expose `.value`
    const input = document.getElementById(`teacher-input-${qId}`);
    studentAnswer = input ? input.value.trim() : '';
    const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();
    isCorrect = norm(studentAnswer) === norm(qData.key) ||
      (qData.key.includes('/') && qData.key.split('/').some(k => norm(k) === norm(studentAnswer)));

    if (input) {
      input.classList.remove('correct', 'incorrect');
      input.classList.add(isCorrect ? 'correct' : 'incorrect');
    }
  }

  registerStudentAnswer(qId, studentAnswer, isCorrect);

  const clozeChip = document.getElementById(`check-chip-${qId}`);
  if (clozeChip) {
    clozeChip.classList.add('checked');
    clozeChip.classList.remove('chip-correct', 'chip-incorrect');
    clozeChip.classList.add(isCorrect ? 'chip-correct' : 'chip-incorrect');
  }

  if (qData.groupLayout === 'cloze') {
    // Single shared dock below the passage-faithful cloze block — content is replaced, never stacked
    const dock = document.getElementById(`cloze-dock-${qData.groupId}`);
    if (dock) {
      dock.innerHTML = `<div class="cloze-dock-header">Câu ${qId}</div>${buildCorrectionRowsHTML(qData)}`;
      setTimeout(() => dock.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  } else {
    const panel = document.getElementById(`correction-${qId}`);
    if (panel) {
      panel.classList.add('open');
      setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  }
}

function buildAllKeysTable() {
  const table = document.getElementById('key-table-body');

/* ═══════════════════════════════════════════════════════════════
   HIGHLIGHT TOOL — robust multi-node, cursor-anchored, click-to-remove
═══════════════════════════════════════════════════════════════ */
let _hlMouseX = 0;
let _hlMouseY = 0;
let _pendingRange = null;

function setupHighlightTool() {
  const toolbar = document.getElementById('hl-toolbar');
  const passagePane = document.getElementById('passage-pane');

  // Track mouse position at all times for accurate toolbar placement
  document.addEventListener('mousemove', (e) => {
    _hlMouseX = e.clientX;
    _hlMouseY = e.clientY;
  });

  // Click on an existing highlight → remove it
  passagePane.addEventListener('click', (e) => {
    const mark = e.target.closest('mark.hl-yellow');
    if (mark) {
      removeHighlight(mark);
      e.stopPropagation();
      return;
    }
  });

  // After mouseup: check if there's a real selection inside the passage
  document.addEventListener('mouseup', (e) => {
    // Ignore clicks inside the toolbar itself
    if (toolbar.contains(e.target)) return;

    // Small delay so selection is settled
    setTimeout(() => {
      const sel = window.getSelection();

      if (!sel || sel.isCollapsed || sel.toString().trim() === '') {
        hideToolbar();
        return;
      }

      // Verify selection is inside the passage pane
      const range = sel.getRangeAt(0);
      if (!passagePane.contains(range.commonAncestorContainer)) {
        hideToolbar();
        return;
      }

      // Store the range for later use when button is clicked
      _pendingRange = range.cloneRange();

      // Position toolbar above where the mouse is
      showToolbarAt(_hlMouseX, _hlMouseY - 52);
    }, 10);
  });

  // Hide toolbar on mousedown outside
  document.addEventListener('mousedown', (e) => {
    if (!toolbar.contains(e.target)) {
      hideToolbar();
    }
  });

  // Hide on scroll (re-anchoring is complex; just hide)
  document.getElementById('passage-pane').addEventListener('scroll', () => {
    hideToolbar();
  });
}

function showToolbarAt(x, y) {
  const toolbar = document.getElementById('hl-toolbar');
  // Clamp so toolbar doesn't go off-screen
  const tw = 130; // approx toolbar width
  const clampedX = Math.min(Math.max(x, tw / 2 + 8), window.innerWidth - tw / 2 - 8);
  const clampedY = Math.max(y, 8);
  toolbar.style.left = `${clampedX}px`;
  toolbar.style.top = `${clampedY}px`;
  toolbar.classList.add('visible');
}

function hideToolbar() {
  document.getElementById('hl-toolbar').classList.remove('visible');
}

function applyHighlight() {
  const sel = window.getSelection();
  const range = (_pendingRange && !_pendingRange.collapsed)
    ? _pendingRange
    : (sel && !sel.isCollapsed ? sel.getRangeAt(0) : null);

  if (!range) { hideToolbar(); return; }

  // Use TreeWalker to split across text nodes safely — no broken DOM
  highlightRange(range);

  // Clear selection
  if (sel) sel.removeAllRanges();
  _pendingRange = null;
  hideToolbar();
}

/**
 * Highlight a Range that may span multiple text nodes / block elements.
 * Strategy: collect all text nodes within the range, wrap each one
 * individually in a <mark>. This avoids the surroundContents() constraint
 * that the range must not partially select an element, and keeps
 * inline flow intact so text never breaks unexpectedly.
 */
function highlightRange(range) {
  const passagePane = document.getElementById('passage-pane');

  // Collect all text nodes touched by the range
  const walker = document.createTreeWalker(
    range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer,
    NodeFilter.SHOW_TEXT,
    null
  );

  const nodes = [];
  let node;
  while ((node = walker.nextNode())) {
    // Only include nodes inside the passage pane
    if (!passagePane.contains(node)) continue;
    if (!range.intersectsNode(node)) continue;
    nodes.push(node);
  }

  nodes.forEach((textNode) => {
    // Determine which portion of this text node is selected
    let start = 0;
    let end = textNode.length;

    if (textNode === range.startContainer) start = range.startOffset;
    if (textNode === range.endContainer) end = range.endOffset;

    if (start >= end) return; // nothing to highlight here

    // Split and wrap only the selected slice
    // splitText returns the tail; we need to be careful about order
    const before = textNode.splitText(start);       // before = [start..end]
    const after  = before.splitText(end - start);   // after = [end..]  (unused but needed)

    const mark = document.createElement('mark');
    mark.className = 'hl-yellow';
    before.parentNode.insertBefore(mark, before);
    mark.appendChild(before);
    highlights.push(mark);
  });

  // Normalize to clean up any adjacent text nodes we created
  // but only where it's safe (not inside inputs)
  try {
    const ancestor = range.commonAncestorContainer.nodeType === Node.TEXT_NODE
      ? range.commonAncestorContainer.parentNode
      : range.commonAncestorContainer;
    ancestor.normalize && ancestor.normalize();
  } catch(e) { /* ignore */ }
}

function removeHighlight(mark) {
  // Unwrap the mark: move all children before the mark, then remove mark
  const parent = mark.parentNode;
  if (!parent) return;
  while (mark.firstChild) {
    parent.insertBefore(mark.firstChild, mark);
  }
  parent.removeChild(mark);
  parent.normalize();
  // Remove from highlights array
  const idx = highlights.indexOf(mark);
  if (idx > -1) highlights.splice(idx, 1);
}

function clearAllHighlights() {
  // Work on a copy since removeHighlight mutates the array
  [...highlights].forEach(mark => removeHighlight(mark));
  highlights = [];
}

/* ═══════════════════════════════════════════════════════════════
   RESIZABLE SPLITTER
═══════════════════════════════════════════════════════════════ */
function setupSplitter() {
  const splitter = document.getElementById('splitter');
  const passagePane = document.getElementById('passage-pane');
  const splitContainer = document.getElementById('split-container');

  let isDragging = false;
  let startX = 0;
  let startWidth = 0;

  splitter.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startWidth = passagePane.offsetWidth;
    splitter.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const containerW = splitContainer.offsetWidth;
    const newW = Math.min(Math.max(startWidth + dx, 280), containerW - 280);
    passagePane.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    splitter.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

/* ═══════════════════════════════════════════════════════════════
   TIPS PANEL
═══════════════════════════════════════════════════════════════ */
function openTipsPanel(qType) {
  const panel = document.getElementById('tips-panel');
  const title = document.getElementById('tips-panel-title');
  const body  = document.getElementById('tips-panel-body');

  // Find matching tips — try exact match, then partial
  let data = TIPS_DATA[qType];
  if (!data) {
    const key = Object.keys(TIPS_DATA).find(k => qType.toLowerCase().includes(k.toLowerCase().split(' ')[0]));
    data = key ? TIPS_DATA[key] : null;
  }

  if (!data) {
    body.innerHTML = `<div style="color:var(--ink-muted);padding:20px;font-size:13px;">Chưa có tips cho dạng bài này.</div>`;
  } else {
    title.textContent = qType;

    const stepsHtml = data.steps.map((s, i) => `
      <div class="tips-item">
        <div class="tips-item-num">${i + 1}</div>
        <div class="tips-item-text"><strong>${s.title}:</strong> ${s.text}</div>
      </div>`).join('');

    const trapsHtml = data.traps.map(t => `
      <div class="tips-trap">
        <span class="tips-trap-icon">⚠️</span>
        <span>${t}</span>
      </div>`).join('');

    const bandHtml = data.bandTips.map(b => `
      <div class="tips-band">
        <span class="tips-band-icon">🚀</span>
        <span>${b}</span>
      </div>`).join('');

    body.innerHTML = `
      <div class="tips-overview">${data.overview}</div>

      <div class="tips-section">
        <div class="tips-section-title">📋 Quy trình làm bài</div>
        ${stepsHtml}
      </div>

      <div class="tips-section">
        <div class="tips-section-title">⚠️ Bẫy thường gặp</div>
        ${trapsHtml}
      </div>

      <div class="tips-section">
        <div class="tips-section-title">🚀 Tips tăng Band</div>
        ${bandHtml}
      </div>`;
  }

  panel.classList.add('open');
}

function closeTipsPanel() {
  document.getElementById('tips-panel').classList.remove('open');
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR NAV SWITCH (Câu hỏi ↔ Báo cáo)
═══════════════════════════════════════════════════════════════ */
function switchSidebarView(view) {
  const isQ = view === 'questions';
  const qView = document.getElementById('sidebar-view-questions');
  const rView = document.getElementById('sidebar-view-report');
  qView.classList.toggle('hidden', !isQ);
  rView.classList.toggle('visible', !isQ);
  document.getElementById('snav-questions').classList.toggle('active', isQ);
  document.getElementById('snav-report').classList.toggle('active', !isQ);
  if (!isQ) buildReport();
}

/* ═══════════════════════════════════════════════════════════════
   REPORT BUILDER
═══════════════════════════════════════════════════════════════ */
// Track student answers: { qId: { studentAnswer, isCorrect } }
const studentAnswers = {};

// Call after each checkAnswer to register
function registerStudentAnswer(qId, studentAnswer, isCorrect) {
  studentAnswers[qId] = { studentAnswer, isCorrect };
}

function buildReport() {
  const hint    = document.getElementById('report-hint');
  const content = document.getElementById('report-content');
  const totalChecked = Object.keys(studentAnswers).length;

  if (totalChecked === 0) {
    hint.style.display = 'flex';
    content.classList.remove('visible');
    return;
  }

  hint.style.display = 'none';
  content.classList.add('visible');

  // Group results by question type
  const byType = {}; // { typeName: { total, wrong, items: [{id, isCorrect}] } }

  for (const group of TEACHER_DATA.questions) {
    const type = group.type;
    if (!byType[type]) byType[type] = { total: 0, wrong: 0, items: [] };
    for (const item of group.items) {
      if (studentAnswers[item.id] !== undefined) {
        byType[type].total++;
        const correct = studentAnswers[item.id].isCorrect;
        if (!correct) byType[type].wrong++;
        byType[type].items.push({ id: item.id, isCorrect: correct });
      }
    }
  }

  // Build weakness list
  const weakTypes = Object.entries(byType)
    .filter(([, v]) => v.total > 0 && v.wrong > 0)
    .sort((a, b) => (b[1].wrong / b[1].total) - (a[1].wrong / a[1].total));

  let html = '';

  // Summary per type
  for (const [type, data] of Object.entries(byType)) {
    if (data.total === 0) continue;
    const correct = data.total - data.wrong;
    const pct = Math.round((correct / data.total) * 100);
    const scoreClass = pct >= 80 ? 'good' : pct >= 50 ? 'mid' : 'bad';
    const shortType = type.split(' ').slice(0, 3).join(' ');

    const qRows = data.items.map(item => {
      const icon = item.isCorrect ? '✅' : '❌';
      const diag = item.isCorrect ? '' : getDiagnosis(item.id);
      return `<div class="report-q-row">
        <span class="rq-num">${item.id}</span>
        <span class="rq-status">${icon}</span>
        <span class="rq-diag">${diag}</span>
      </div>`;
    }).join('');

    html += `<div class="report-group-card">
      <div class="report-group-head">
        <span class="report-group-name">${shortType}</span>
        <span class="report-group-score ${scoreClass}">${correct}/${data.total} · ${pct}%</span>
      </div>
      <div class="report-q-list">${qRows}</div>
    </div>`;
  }

  // Focus areas for student
  if (weakTypes.length > 0) {
    const focusItems = weakTypes.slice(0, 3).map(([type, data]) => {
      const pct = Math.round(((data.total - data.wrong) / data.total) * 100);
      const shortT = type.split(' ').slice(0,3).join(' ');
      return `<div class="report-focus-item">
        <div class="report-focus-dot"></div>
        <div><strong>${shortT}</strong>: ${pct}% chính xác — cần ôn lại quy trình và bẫy thường gặp</div>
      </div>`;
    }).join('');

    html += `<div class="report-summary-box">
      <div class="report-summary-title">🎯 Học sinh cần tập trung</div>
      ${focusItems}
    </div>`;
  } else if (totalChecked > 0) {
    html += `<div class="report-summary-box">
      <div class="report-summary-title">🎉 Kết quả tốt!</div>
      <div class="report-focus-item"><div class="report-focus-dot"></div><div>Học sinh làm tốt tất cả dạng bài đã check.</div></div>
    </div>`;
  }

  content.innerHTML = html;
}

function getDiagnosis(qId) {
  // Find which question type this belongs to
  for (const group of TEACHER_DATA.questions) {
    for (const item of group.items) {
      if (item.id === qId) {
        const type = group.type;
        if (type.includes('TRUE') || type.includes('FALSE')) return 'Nhầm FALSE/NOT GIVEN';
        if (type.includes('Multiple')) return 'Chọn distractor';
        if (type.includes('Short')) return 'Sai từ / vượt giới hạn';
        if (type.includes('Heading')) return 'Nhầm ý chính';
        if (type.includes('Matching')) return 'Locate sai đoạn';
        if (type.includes('Summary')) return 'Sai từ / paraphrase';
        return 'Cần xem lại';
      }
    }
  }
  return '';
}
